<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoodleNotes | Premium Visual Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12);
        }

        .premium-gradient {
            background: linear-gradient(135deg, #fffcf5 0%, #f7f1e3 100%);
        }

        .cart-badge { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .float-btn {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-900">

    <a href="https://wa.me/918158094433?text=Hi, I need help with DoodleNotes." target="_blank" class="fixed bottom-8 right-8 z-[100] bg-[#25D366] text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 float-btn hover:scale-110 transition-transform">
        <i data-lucide="message-circle" class="w-6 h-6"></i>
        <span class="font-bold text-sm">Help?</span>
    </a>

    <nav class="sticky top-0 z-50 glass-nav border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 p-2.5 rounded-xl shadow-lg">
                        <i data-lucide="zap" class="text-yellow-400 w-6 h-6 fill-yellow-400"></i>
                    </div>
                    <span class="text-2xl font-extrabold tracking-tight text-slate-900">Doodle<span class="text-yellow-500">Notes</span></span>
                </div>
                
                <div class="flex items-center gap-6">
                    <button class="relative p-3 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors" onclick="toggleCart()">
                        <i data-lucide="shopping-bag" class="w-5 h-5 text-slate-700"></i>
                        <span id="cart-count" class="hidden absolute -top-1 -right-1 flex items-center justify-center w-5 h-5 text-[10px] font-bold text-white bg-yellow-500 rounded-full border-2 border-white cart-badge">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-20 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-[800] text-slate-900 mb-6 leading-tight tracking-tight">
                Master Science with <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-orange-500">Visual Intelligence.</span>
            </h1>
            <p class="text-lg text-slate-500 mb-10 max-w-xl mx-auto font-medium">
                Premium infographics & handwritten study notes for WBHSC Science students.
            </p>
            <div class="flex flex-wrap justify-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all">
                <div class="flex items-center gap-2 font-bold text-xs"><i data-lucide="shield-check" class="w-4 h-4 text-green-500"></i> UPI SECURE</div>
                <div class="flex items-center gap-2 font-bold text-xs"><i data-lucide="clock" class="w-4 h-4 text-blue-500"></i> INSTANT ACCESS</div>
                <div class="flex items-center gap-2 font-bold text-xs"><i data-lucide="phone" class="w-4 h-4 text-green-400"></i> 24/7 WHATSAPP</div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 lg:px-8 pb-32">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="cart-drawer" class="hidden fixed inset-0 z-[100] overflow-hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white shadow-2xl flex flex-col p-8 transform transition-all duration-500">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-[800] flex items-center gap-3">
                    <i data-lucide="shopping-bag" class="w-6 h-6 text-yellow-500"></i> My Cart
                </h2>
                <button onclick="toggleCart()" class="p-2 hover:bg-slate-100 rounded-full">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-6"></div>

            <div id="cart-footer" class="hidden pt-8 border-t border-slate-100">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">Total Amount</span>
                        <span id="cart-total" class="text-3xl font-[900] text-slate-900">₹0</span>
                    </div>
                </div>

                <button onclick="checkoutToWhatsApp()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-[800] hover:bg-slate-800 transition-all flex justify-center items-center gap-3 shadow-xl shadow-slate-200">
                    Buy via WhatsApp <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                title: "Physics Visual Infographic", 
                category: "Class 12 • Sem 3", 
                price: 10, 
                tag: "Top Revision Pick", 
                desc: "ইলেক্ট্রোস্ট্যাটিক্স থেকে শুরু করে তড়িৎ চুম্বকীয় তরঙ্গ—সব গুরুত্বপূর্ণ সূত্র ও ডায়াগ্রাম এখন এক জায়গায়। সহজ ডুডলস ও নিয়ন হাইলাইটেড নোটস।" 
            },
            { id: 2, title: "Organic Chemistry", category: "Chemistry", price: 400, tag: "Recommended", desc: "Nomenclature & Bonding rules made simple with 3D doodles." },
            { id: 3, title: "Adarini - Story Map", category: "Bengali", price: 150, tag: "Class 12", desc: "Full chapter visualization and character analysis." }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-[32px] p-8 flex flex-col h-full border-2 border-transparent hover:border-yellow-400 shadow-sm transition-all">
                    <div class="mb-6 flex justify-between items-start">
                        <span class="px-3 py-1 bg-red-100 text-red-600 text-[10px] font-extrabold uppercase tracking-widest rounded-full">
                            ${p.tag}
                        </span>
                        <div class="text-slate-300"><i data-lucide="star" class="w-5 h-5 fill-yellow-400 text-yellow-400"></i></div>
                    </div>
                    
                    <div class="mb-8 p-6 bg-slate-50 rounded-2xl flex flex-col items-center justify-center min-h-[180px] premium-gradient relative overflow-hidden border border-slate-100">
                         <div class="text-center">
                            <h4 class="font-extrabold text-slate-800 text-lg mb-1">${p.id === 1 ? 'PHYSICS SEM-3' : p.title}</h4>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">WBHSC Full Syllabus Covered</p>
                         </div>
                         <div class="mt-4 flex gap-2">
                            <span class="w-8 h-8 rounded-full bg-yellow-300/50 border border-yellow-500 flex items-center justify-center text-[8px] font-bold">Gauss</span>
                            <span class="w-8 h-8 rounded-full bg-blue-300/50 border border-blue-500 flex items-center justify-center text-[8px] font-bold">Ohm</span>
                            <span class="w-8 h-8 rounded-full bg-orange-300/50 border border-orange-500 flex items-center justify-center text-[8px] font-bold">EMW</span>
                         </div>
                    </div>

                    <div class="flex-grow">
                        <p class="text-xs font-bold text-yellow-600 mb-2 uppercase tracking-wide">${p.category}</p>
                        <h3 class="text-2xl font-extrabold text-slate-900 mb-3">${p.title}</h3>
                        <p class="text-sm text-slate-500 leading-relaxed mb-6">${p.desc}</p>
                        ${p.id === 1 ? `
                        <ul class="text-[11px] space-y-2 text-slate-600 mb-6">
                            <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> Coulomb's & Gauss's Law</li>
                            <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> Magnetic Effect & EMI</li>
                            <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i> Full EM Spectrum Guide</li>
                        </ul>` : ''}
                    </div>

                    <div class="flex flex-col gap-3 pt-6 border-t border-slate-50">
                        <div class="flex items-center justify-between">
                            <span class="text-3xl font-[900] text-slate-900">₹${p.price}</span>
                            <span class="text-sm text-slate-400 line-through">₹${p.price * 10}</span>
                        </div>
                        <button onclick="buyNow('${p.title}', ${p.price})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-yellow-500 hover:text-slate-900 transition-all flex justify-center items-center gap-2 shadow-lg shadow-slate-200">
                            Buy Now & Download <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function buyNow(title, price) {
            const message = `Hello Rahat! I want to buy "${title}" for ₹${price}. Please share payment details.`;
            window.open(`https://wa.me/918158094433?text=${encodeURIComponent(message)}`, '_blank');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('hidden');
        }

        lucide.createIcons();
        renderProducts();
    </script>
</body>
</html>
